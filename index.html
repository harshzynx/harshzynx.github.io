<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Raj | Harshzynx Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #030303; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: white; text-align: center; }
        #canvas-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 80px 20px; }
        
        /* EXACT FILE MATCH SLIDER */
        .slider-container {
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--primary); 
            margin: 0 auto 30px; overflow: hidden; position: relative; 
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.4);
        }
        .slider-wrapper {
            display: flex; width: 500%; /* 5 images loaded in your GitHub */
            height: 100%; transition: transform 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .slider-wrapper img {
            width: 20%; height: 100%; object-fit: cover;
        }

        h1 { font-size: 2.8rem; margin: 0; letter-spacing: -2px; font-weight: 800; }
        .tagline { color: #888; margin-bottom: 40px; font-weight: 600; }

        .menu-btn {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 22px; border-radius: 25px; margin-bottom: 15px; color: white;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-btn:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--primary); transform: scale(1.02); }

        .content-box {
            max-height: 0; overflow: hidden; transition: 0.5s ease-in-out; opacity: 0;
            background: rgba(255,255,255,0.02); border-radius: 0 0 25px 25px;
            margin-top: -15px; margin-bottom: 20px; text-align: left;
        }
        .content-box.active { max-height: 500px; opacity: 1; padding: 25px; border: 1px solid rgba(255,255,255,0.05); border-top: none; }

        .footer { margin-top: 50px; font-size: 10px; color: #444; letter-spacing: 3px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px; }
    </style>
</head>
<body>
    <canvas id="canvas-stars"></canvas>

    <div class="container">
        <div class="slider-container">
            <div class="slider-wrapper" id="slider">
                <img src="photo1.jpg" alt="Harsh 1">
                <img src="photo2.jpg" alt="Harsh 2">
                <img src="Photo3.jpg" alt="Harsh 3"> <img src="photo4 (1).jpg" alt="Harsh 4"> <img src="profile.jpg" alt="Harsh 5">
            </div>
        </div>

        <h1>HARSH <span style="color:var(--primary)">RAJ</span></h1>
        <p class="tagline">HARSHZYNX | MU RAJKOT</p>

        <button class="menu-btn" onclick="toggleSection('social')">
            <span><i class="fas fa-hashtag"></i> SOCIAL NETWORK</span>
            <i class="fas fa-plus"></i>
        </button>
        <div id="social" class="content-box">
            <a href="https://www.linkedin.com/in/harshzynx-09a42a275" target="_blank" style="display:block; color:#aaa; text-decoration:none; margin-bottom:15px;"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://www.instagram.com/harshzynx/" target="_blank" style="display:block; color:#aaa; text-decoration:none; margin-bottom:15px;"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://www.facebook.com/share/18YLdvxKJV/" target="_blank" style="display:block; color:#aaa; text-decoration:none; margin-bottom:15px;"><i class="fab fa-facebook"></i> Facebook</a>
        </div>

        <button class="menu-btn" onclick="toggleSection('edu')">
            <span><i class="fas fa-graduation-cap"></i> EDUCATION</span>
            <i class="fas fa-plus"></i>
        </button>
        <div id="edu" class="content-box">
            <p style="margin:0; font-weight:700;">Marwadi University, Rajkot</p>
            <p style="font-size:12px; color:#666; margin-bottom:15px;">B.Tech CSE | 2024-2028</p>
            <p style="margin:0; font-weight:700;">Manas International School</p>
            <p style="font-size:12px; color:#666;">Jehanabad, Bihar</p>
        </div>

        <button class="menu-btn" onclick="toggleSection('contact')">
            <span><i class="fas fa-comment"></i> QUICK MESSAGE</span>
            <i class="fas fa-plus"></i>
        </button>
        <div id="contact" class="content-box">
            <a href="https://wa.me/919263216785" target="_blank" style="background:#25D366; color:white; padding:15px; display:block; text-align:center; border-radius:15px; text-decoration:none; font-weight:700;">
                <i class="fab fa-whatsapp"></i> MESSAGE ON WHATSAPP
            </a>
        </div>

        <div class="footer">SYSTEM_CORE: HARSHZYNX | © 2026</div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        let currentSlide = 0;
        function autoSlide() {
            currentSlide = (currentSlide + 1) % 5;
            slider.style.transform = `translateX(-${currentSlide * 20}%)`;
        }
        setInterval(autoSlide, 3000);

        function toggleSection(id) {
            const sections = document.querySelectorAll('.content-box');
            sections.forEach(sec => {
                if(sec.id === id) sec.classList.toggle('active');
                else sec.classList.remove('active');
            });
        }

        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = [];
            for(let i=0; i<150; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.4 });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init); init(); animate();
    </script>
</body>
</html>
