<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harshzynx | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 320px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
            color: #00d2ff;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #ddd;
            margin-bottom: 30px;
        }

        #typing-text {
            color: #00d2ff;
            font-weight: 700;
            border-right: 2px solid #00d2ff;
            padding-right: 5px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .btn-linkedin { background: #0077b5; }
        .btn-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .btn-facebook { background: #1877f2; }
        .btn-x { background: #000000; border: 1px solid #333; }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Harsh Raj</h1>
        <p>I am a <span id="typing-text"></span></p>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/harshzynx-09a42a275" class="btn btn-linkedin" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>

            <a href="https://www.instagram.com/harshzynx" class="btn btn-instagram" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://www.facebook.com/profile.php?id=100076241908092" class="btn btn-facebook" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>

            <a href="https://x.com/harshzynx" class="btn btn-x" target="_blank">
                <i class="fab fa-x-twitter"></i> X (Twitter)
            </a>
        </div>

        <div class="footer">
            © 2026 HARSHZYNX DIGITAL
        </div>
    </div>

    <script>
        const textElement = document.getElementById("typing-text");
        const phrases = ["Full Stack Developer", "Known as Harshzynx", "Tech Enthusiast", "Creative Thinker"];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 2000; 
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        document.addEventListener("DOMContentLoaded", type);
    </script>
</body>
</html>
