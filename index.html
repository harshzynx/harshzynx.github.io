<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="MzRa-c-0qGRbnGtsAU_ETOSU_B0p7kaao4oCHIv3Ibc" />
    <title>Harsh Raj — Professional Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0a0c10; --card: #12151c; --accent: #3b82f6; --text: #f8fafc; --border: rgba(255, 255, 255, 0.08); }
        [data-theme="light"] { --bg: #ffffff; --card: #f8fafc; --text: #0f172a; --border: rgba(0, 0, 0, 0.08); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.4s; overflow-x: hidden; }
        .container { max-width: 850px; margin: 0 auto; padding: 40px 24px; }
        
        /* 🖼️ MANUAL PHOTO BOX (NO SLIDER) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 40px; color: white; cursor: pointer; }
        .photo-frame { width: 90%; max-width: 700px; height: 450px; border: 2px solid var(--accent); border-radius: 20px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* 📦 ICON BOX STYLE */
        .btn-row { display: flex; gap: 15px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 15px 25px; border-radius: 14px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; text-decoration: none; }
        .icon-btn:hover { border-color: var(--accent); transform: translateY(-3px); }
        .nav-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* 📱 SOCIAL BOX POPUP */
        .social-links-area { display: none; gap: 20px; margin-top: 15px; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--border); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-theme="dark">

    <div id="certVault" class="modal">
        <span class="close-btn" onclick="closeBox('certVault')">&times;</span>
        <div class="photo-frame">
            <img id="certImg" src="Certificate 1.jpg">
        </div>
        <div class="btn-row">
            <button class="nav-btn" onclick="changePhoto('cert', -1)">PREV</button>
            <button class="nav-btn" onclick="changePhoto('cert', 1)">NEXT</button>
        </div>
    </div>

    <div id="photoVault" class="modal">
        <span class="close-btn" onclick="closeBox('photoVault')">&times;</span>
        <div class="photo-frame">
            <img id="galImg" src="Certificate 5.jpg">
        </div>
        <div class="btn-row">
            <button class="nav-btn" onclick="changePhoto('gal', -1)">PREV</button>
            <button class="nav-btn" onclick="changePhoto('gal', 1)">NEXT</button>
        </div>
    </div>

    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:50px;">
            <div style="font-weight:800; color:var(--accent); font-size:1.2rem;">HARSHZYNX.IO</div>
            <button onclick="toggleTheme()" class="icon-btn" style="padding: 8px 15px;">Night Mode</button>
        </header>

        <section>
            <h1 style="font-family:'Plus Jakarta Sans'; font-size: clamp(3rem, 10vw, 5rem); line-height: 1; margin-bottom: 20px;">Harsh Raj.</h1>
            <p style="color:var(--text-dim); font-size: 1.2rem;">B.Tech CS Student @ Marwadi University, Rajkot.</p>
            
            <div class="btn-row" style="justify-content: flex-start; margin-top: 30px;">
                <button class="icon-btn" onclick="openBox('certVault')">
                    <i class="fas fa-medal" style="color: gold;"></i> Certificates
                </button>
                
                <button class="icon-btn" onclick="openBox('photoVault')">
                    <i class="fas fa-images" style="color: var(--accent);"></i> Gallery
                </button>

                <button class="icon-btn" onclick="toggleSocials()">
                    <i class="fas fa-share-nodes" style="color: #22c55e;"></i> Social Media
                </button>
            </div>

            <div id="socialArea" class="social-links-area">
                <a href="https://github.com/harsh62h" class="icon-btn" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://instagram.com/harshzynx" class="icon-btn" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://x.com/harshzynx" class="icon-btn" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="mailto:harshsharma18089@gmail.com" class="icon-btn"><i class="fas fa-envelope"></i></a>
            </div>
        </section>

        <section style="margin-top: 60px;">
            <h2 style="font-size: 1.8rem; margin-bottom: 25px;">Academic History</h2>
            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px;">
                <p><b>Marwadi University, Rajkot</b><br>B.Tech CS (2024 - 2028)</p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                <p><b>Manas International School, Jehanabad</b><br>10th & 12th Grades Archive</p>
            </div>
        </section>

        <footer style="margin-top: 60px; text-align: center;">
            <a href="https://wa.me/919263216785" class="icon-btn" style="background:#22c55e; color:white; border:none;">WhatsApp</a>
            <p style="margin-top: 20px; opacity: 0.6;">© 2026 Harsh Raj | Rajkot, Gujarat</p>
        </footer>
    </div>

    <script>
        const certList = ["Certificate 1.jpg", "Certificate 2.jpg", "Certificate 3.jpg", "Certificate 4.jpg", "Certificate 6.jpg", "Certificate 7.jpg"];
        const galList = ["Certificate 5.jpg", "photo1.jpg", "photo2.jpg", "Photo3.jpg", "photo4 (1).jpg"];
        let cIdx = 0, gIdx = 0;

        function openBox(id) { document.getElementById(id).style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeBox(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; }
        
        function changePhoto(type, dir) {
            if(type === 'cert') {
                cIdx = (cIdx + dir + certList.length) % certList.length;
                document.getElementById('certImg').src = certList[cIdx];
            } else {
                gIdx = (gIdx + dir + galList.length) % galList.length;
                document.getElementById('galImg').src = galList[gIdx];
            }
        }

        function toggleSocials() {
            const area = document.getElementById('socialArea');
            area.style.display = (area.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    </script>
</body>
</html>
